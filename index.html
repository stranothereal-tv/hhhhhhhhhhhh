<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solvaro Waitlist</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0d0d0d;
      color:#fff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:#161616;
      padding:30px;
      border-radius:20px;
      border:1px solid #2a2a2a;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:#aaa;
      margin-bottom:25px;
    }

    label{
      display:block;
      margin-bottom:15px;
    }

    label span{
      display:block;
      margin-bottom:6px;
      font-size:14px;
    }

    input,
    textarea{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #333;
      background:#111;
      color:#fff;
    }

    textarea{
      resize:vertical;
      min-height:100px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#fff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      opacity:.9;
    }

    .radio-group{
      margin:20px 0;
    }

    .radio-group label{
      display:inline-block;
      margin-right:20px;
    }

    @media(max-width:600px){
      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Join the Solvaro Waitlist</h1>
  <p>Submit your details for artist roster review.</p>

  <form action="https://formspree.io/f/mykaokn" method="POST">

    <div class="row">
      <label>
        <span>Full Name</span>
        <input type="text" name="fullName" required>
      </label>

      <label>
        <span>Artist Name</span>
        <input type="text" name="artistName" required>
      </label>
    </div>

    <div class="row">
      <label>
        <span>Email</span>
        <input type="email" name="email" required>
      </label>

      <label>
        <span>Phone Number</span>
        <input type="tel" name="phone" required>
      </label>
    </div>

    <label>
      <span>Password</span>
      <input type="password" name="password" minlength="8" required>
    </label>

    <label>
      <span>Social Accounts</span>
      <textarea
        name="socials"
        placeholder="Instagram, TikTok, Spotify, SoundCloud..."
        required></textarea>
    </label>

    <label>
      <span>YouTube Channel</span>
      <input
        type="url"
        name="youtube"
        placeholder="https://youtube.com/@yourchannel">
    </label>

    <div class="radio-group">
      <strong>Have you released music before?</strong><br><br>

      <label>
        <input type="radio" name="released" value="Yes" required>
        Yes
      </label>

      <label>
        <input type="radio" name="released" value="No">
        No
      </label>
    </div>

    <label>
      <span>Spotify Artist Profile</span>
      <input
        type="url"
        name="spotifyArtistProfile"
        placeholder="https://open.spotify.com/artist/...">
    </label>

    <label>
      <span>Song Link (Google Drive, Dropbox, etc.)</span>
      <input
        type="url"
        name="songLink"
        placeholder="https://">
    </label>

    <button type="submit">
      Submit to Waitlist
    </button>

  </form>

</div>

</body>
</html>
